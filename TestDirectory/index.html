<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our Newsletter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1rem;
            line-height: 1.5;
        }

        .email-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-group {
            position: relative;
        }

        input[type="email"] {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .features {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
        }

        .features ul {
            list-style: none;
            text-align: left;
        }

        .features li {
            color: #555;
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
        }

        .features li::before {
            content: "\2713";
            color: #667eea;
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        .privacy {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #999;
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stay Updated</h1>
        <p class="subtitle">Subscribe to our newsletter and get the latest updates delivered straight to your inbox.</p>

        <form class="email-form" id="emailForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="Enter your email address" required>
            </div>
            <button type="submit">Subscribe Now</button>
        </form>

        <div class="message" id="message"></div>

        <div class="features">
            <ul>
                <li>Weekly curated content</li>
                <li>Exclusive offers and updates</li>
                <li>No spam, unsubscribe anytime</li>
            </ul>
        </div>

        <p class="privacy">We respect your privacy. Your email will never be shared.</p>
    </div>

    <script>
        document.getElementById('emailForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const messageEl = document.getElementById('message');

            if (email) {
                messageEl.textContent = 'Thank you for subscribing! Check your inbox for confirmation.';
                messageEl.className = 'message success';
                document.getElementById('email').value = '';
            } else {
                messageEl.textContent = 'Please enter a valid email address.';
                messageEl.className = 'message error';
            }
        });
    </script>
</body>
</html>
